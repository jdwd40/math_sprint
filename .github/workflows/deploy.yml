name: Deploy Vite App

on:
  push:
    branches:
      - master  # Adjust branch if needed

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'  # Use the Node.js version your app requires

    - name: Install dependencies
      run: npm install

    - name: Build Vite app
      run: npm run build

    - name: Deploy to VPS
      env:
        HOST: ${{ secrets.VPS_HOST }}  # e.g., 213.165.91.221
        USER: ${{ secrets.VPS_USER }}  # e.g., jd
        PORT: ${{ secrets.VPS_PORT }}  # e.g., 4020
        TARGET_DIR: /var/www/jdwd40.com/html/ms

      run: |
        # Package and transfer files
        tar -czf dist.tar.gz -C dist .
        scp -P $PORT dist.tar.gz $USER@$HOST:$TARGET_DIR
        ssh -p $PORT $USER@$HOST "tar -xzf $TARGET_DIR/dist.tar.gz -C $TARGET_DIR && rm $TARGET_DIR/dist.tar.gz"

    - name: Restart pm2
      env:
        HOST: ${{ secrets.VPS_HOST }}
        USER: ${{ secrets.VPS_USER }}
        PORT: ${{ secrets.VPS_PORT }}

      run: |
        ssh -p $PORT $USER@$HOST "pm2 restart my-vite-app"  # Replace with your pm2 app name
